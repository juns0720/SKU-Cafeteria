<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SKU 학식 — Hi-fi Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
  body { font-family: "Gaegu", system-ui, sans-serif; }
  .design-canvas { cursor: grab; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hifi-system.jsx"></script>
<script type="text/babel" src="hifi-screens-1.jsx"></script>
<script type="text/babel" src="hifi-screens-2.jsx"></script>
<script type="text/babel" src="hifi-screens-3.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "orange",
  "showTitles": true
}/*EDITMODE-END*/;

// Read accent → override T.orange via a <style> on the fly
const ACCENTS = {
  orange: { main: '#EF8A3D', soft: '#FCE3CC' },    // 기본 (주황)
  rose:   { main: '#E5766C', soft: '#F7D6D0' },    // 로즈
  green:  { main: '#7BA85C', soft: '#DBE7CC' },    // 초록
  indigo: { main: '#6B7FB8', soft: '#D7DCEB' },    // 인디고
};

function App() {
  const [tw, setTw] = React.useState(TWEAKS);
  const [panel, setPanel] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setPanel(true);
      if (e.data.type === '__deactivate_edit_mode') setPanel(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const update = (k, v) => {
    const next = { ...tw, [k]: v };
    setTw(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Override orange accent at runtime by mutating T
  const acc = ACCENTS[tw.accent] || ACCENTS.orange;
  window.T.orange = acc.main;
  window.T.orangeSoft = acc.soft;

  return (
    <React.Fragment>
      <DesignCanvas>
        <div style={{
          padding: '20px 60px 30px',
          maxWidth: 900,
        }}>
          <div style={{
            fontFamily: '"Jua", sans-serif', fontSize: 40, color: '#2B2218',
            letterSpacing: -0.5, lineHeight: 1.1,
          }}>
            SKU 학식 <span style={{ color: acc.main }}>Hi-fi</span>
          </div>
          <div style={{
            fontFamily: '"Gaegu", sans-serif', fontSize: 16, color: '#5C4F42',
            marginTop: 6, lineHeight: 1.5,
          }}>
            7개 화면 · 모바일 뷰포트 375 × 760 · 정적 목업<br />
            <span style={{ color: '#8F8377', fontSize: 14 }}>두 손가락 스크롤/드래그로 이동, 핀치로 확대</span>
          </div>
        </div>

        <DCSection
          title="코어 플로우"
          subtitle="① 홈 → ② 주간 → ③ 전체 메뉴 → ④ 메뉴 상세 → ⑤ 리뷰 작성"
          gap={60}>
          <HiHome />
          <HiWeek />
          <HiAll />
          <HiDetail />
          <HiWrite />
        </DCSection>

        <DCSection
          title="프로필 & 온보딩"
          subtitle="⑥ 프로필 · ⑦ 로그인 · 닉네임 설정 · 빈 상태"
          gap={60}>
          <HiProfile />
          <HiLogin />
          <HiNickname />
          <HiEmpty />
        </DCSection>

        <div style={{ padding: '10px 60px 40px', maxWidth: 900 }}>
          <div style={{ fontFamily: '"Jua", sans-serif', fontSize: 22, color: '#2B2218', marginBottom: 10 }}>
            디자인 시스템 요약
          </div>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'flex-start' }}>
            {[
              { n: '종이', c: '#FBF6EC' },
              { n: '잉크', c: '#2B2218' },
              { n: '주황', c: acc.main },
              { n: '노랑', c: '#F5C451' },
              { n: '초록', c: '#7BA85C' },
              { n: '복숭아', c: '#F4B896' },
            ].map(s => (
              <div key={s.n} style={{
                display: 'flex', alignItems: 'center', gap: 8,
                padding: '8px 12px', background: '#fff',
                border: '1.5px solid #2B2218', borderRadius: 10,
                fontFamily: '"Gaegu", sans-serif', fontSize: 13,
              }}>
                <div style={{
                  width: 18, height: 18, borderRadius: 9, background: s.c,
                  border: '1.5px solid #2B2218',
                }} />
                {s.n}
                <span style={{ color: '#8F8377', fontFamily: 'ui-monospace, monospace', fontSize: 11 }}>{s.c}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 20, marginTop: 16, fontFamily: '"Gaegu", sans-serif', fontSize: 14, color: '#5C4F42' }}>
            <div><span style={{ color: '#8F8377' }}>손글씨</span> · Gaegu</div>
            <div><span style={{ color: '#8F8377' }}>굵은 제목</span> · Jua</div>
            <div><span style={{ color: '#8F8377' }}>획</span> · 1.5~1.8px 잉크, 2–3px 오프셋 그림자</div>
          </div>
        </div>
      </DesignCanvas>

      {panel && (
        <div style={{
          position: 'fixed', right: 18, bottom: 18,
          width: 260, padding: 14,
          background: '#FBF6EC',
          border: '1.8px solid #2B2218', borderRadius: 14,
          boxShadow: '3px 5px 0 rgba(43,34,24,0.15)',
          fontFamily: '"Gaegu", sans-serif',
          zIndex: 100,
        }}>
          <div style={{ fontFamily: '"Jua", sans-serif', fontSize: 17, marginBottom: 8 }}>Tweaks</div>
          <div style={{ fontSize: 12, color: '#8F8377', marginBottom: 6 }}>액센트 컬러</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {Object.entries(ACCENTS).map(([k, v]) => (
              <div key={k} onClick={() => update('accent', k)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 5,
                  padding: '5px 10px',
                  background: tw.accent === k ? '#2B2218' : '#fff',
                  color: tw.accent === k ? '#FBF6EC' : '#2B2218',
                  border: '1.5px solid #2B2218', borderRadius: 999,
                  fontSize: 13, cursor: 'pointer',
                }}>
                <span style={{
                  width: 12, height: 12, borderRadius: 6, background: v.main,
                  border: tw.accent === k ? '1.2px solid #FBF6EC' : '1.2px solid #2B2218',
                }} />
                {k}
              </div>
            ))}
          </div>
          <div style={{ fontSize: 11, color: '#8F8377', marginTop: 10, lineHeight: 1.3 }}>
            변경사항은 새로고침 후에도 유지됩니다.
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
